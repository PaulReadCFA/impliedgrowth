<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Implied Growth Model Static Equation</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-gray-600: #4b5563;
      --color-gray-200: #e5e7eb;
    }

    html, body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      background: #ffffff;
      padding: 0.25rem;
    }

    .equation-container {
      padding: 1rem;
      margin: 0.75rem 0;
      background: #ffffff;
      border: 1px solid var(--color-gray-200);
      border-radius: 0.5rem;
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      -webkit-overflow-scrolling: touch;
      text-align: center;
    }

    .equation-container:first-child {
      margin-top: 0;
    }

    .equation-intro {
      font-size: 1rem;
      color: var(--color-gray-600);
      margin: 1rem 0 0.5rem;
      text-align: left;
      font-weight: 400;
    }

    math {
      display: inline-block;
      font-family: "STIX Two Math", "Cambria Math", "Latin Modern Math", serif;
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>

 <script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    MathML: {
      extensions: ["content-mathml.js"]
    },
    "HTML-CSS": {
      scale: 100,
      linebreaks: { automatic: true }
    },
    showProcessingMessages: false,
    messageStyle: "none",
    skipStartupTypeset: false
  });

    function removeMathJaxTabindex() {
      document.querySelectorAll(".MathJax, .MathJax_Display, [id^='MathJax-']").forEach(function (el) {
        el.removeAttribute("tabindex");
      });
    }

    function postHeight() {
      var h = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: "iframeHeight", id: "static-equation", height: h }, "*");
    }

    MathJax.Hub.Register.StartupHook("End", function () {
      removeMathJaxTabindex();
      setTimeout(removeMathJaxTabindex, 100);
      setTimeout(removeMathJaxTabindex, 500);
      postHeight();
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=MML_HTMLorMML"></script>
</head>
<body>

  <div class="equation-container">
    <div id="static-equation">
      <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
        <mrow>
          <mi mathcolor="#15803d">g</mi>
          <mo>=</mo>
          <mi mathcolor="#7a46ff">r</mi>
          <mo>&minus;</mo>
          <mfrac>
            <mrow>
              <msub>
                <mi mathcolor="#3c6ae5">Div</mi>
                <mi>t</mi>
              </msub>
              <mrow>
                <mo>(</mo>
                <mn>1</mn>
                <mo>+</mo>
                <mi mathcolor="#15803d">g</mi>
                <mo>)</mo>
              </mrow>
            </mrow>
            <msub>
              <mi mathcolor="#b95b1d">PV</mi>
              <mi>t</mi>
            </msub>
          </mfrac>
        </mrow>
      </math>
    </div>
  </div>

  <p class="equation-intro">
    Solving for
    <math xmlns="http://www.w3.org/1998/Math/MathML">
      <mstyle mathcolor="#15803d"><mi>g</mi></mstyle>
    </math>
    :
  </p>

  <div class="equation-container">
    <div id="static-solved-equation">
      <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
        <mrow>
          <mi mathcolor="#15803d">g</mi>
          <mo>=</mo>
          <mfrac>
            <mrow>
              <mi mathcolor="#7a46ff">r</mi>
              <mo>&InvisibleTimes;</mo>
              <msub>
                <mi mathcolor="#b95b1d">PV</mi>
                <mi>t</mi>
              </msub>
              <mo>&minus;</mo>
              <msub>
                <mi mathcolor="#3c6ae5">Div</mi>
                <mi>t</mi>
              </msub>
            </mrow>
            <mrow>
              <msub>
                <mi mathcolor="#b95b1d">PV</mi>
                <mi>t</mi>
              </msub>
              <mo>+</mo>
              <msub>
                <mi mathcolor="#3c6ae5">Div</mi>
                <mi>t</mi>
              </msub>
            </mrow>
          </mfrac>
        </mrow>
      </math>
    </div>
  </div>

  <script>
    window.addEventListener("load", postHeight);
    window.addEventListener("resize", postHeight);
  </script>
</body>
</html>
